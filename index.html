<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everton Luidy - Superação Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #e0e0e0;
        }
        .container {
            background-color: #1a1a1a;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid #007bff;
        }
        h1 {
            color: #007bff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p.subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 2rem;
        }
        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }
        .timer-unit {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }
        .timer-unit:hover {
            transform: translateY(-5px);
            border-color: #007bff;
        }
        .number {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
            color: #007bff;
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }
        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
            display: block;
        }
        .detailed-time {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-top: 1rem;
            border-left: 4px solid #007bff;
            text-align: left;
            font-size: 0.95rem;
        }
        .detailed-time b {
            color: #007bff;
        }
        .message {
            font-weight: bold;
            color: #00d4ff;
            margin: 1.5rem 0;
            min-height: 1.5em;
            font-size: 1.1rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px #007bff);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌀</div>
        <h1>Everton Luidy</h1>
        <p class="subtitle">"100% Superado" da Ana Flavia</p>
        
        <p>Contagem regressiva da liberdade:</p>
        
        <div class="timer">
            <div class="timer-unit">
                <span class="number" id="days">00</span>
                <span class="label">Dias</span>
            </div>
            <div class="timer-unit">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="timer-unit">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="timer-unit">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="detailed-time" id="detailed-time">
            Carregando análise profunda...
        </div>

        <div class="message" id="dynamic-message">
            Sincronizando memórias...
        </div>

        <div class="footer">
            O fim do ciclo: 08/10/2024 às 18:00
        </div>
    </div>

    <script>
        const startDate = new Date('2024-10-08T18:00:00');
        
        const messages = [
            "Ele jura que nem lembra mais dela...",
            "Superação nível: Olhando os stories no fake.",
            "Já apagou as fotos (estão na pasta oculta).",
            "A Ana Flavia segue vivendo de aluguel na mente dele.",
            "Superado? Sei... 😂",
            "Cada segundo é uma vitória (ou uma recaída evitada).",
            "O coração tá batendo em ritmo de 'saudade do que a gente não viveu'.",
            "Status: Ouvindo Marília Mendonça e dizendo que é só pelo ritmo."
        ];

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');

            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            let detailedStr = "Tempo exato de superação: ";
            if (years > 0) detailedStr += `<b>${years}</b> ${years === 1 ? 'ano' : 'anos'}, `;
            detailedStr += `<b>${months}</b> ${months === 1 ? 'mês' : 'meses'} e <b>${days}</b> ${days === 1 ? 'dia' : 'dias'}.`;
            
            document.getElementById('detailed-time').innerHTML = detailedStr;

            if (s % 10 === 0) {
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                document.getElementById('dynamic-message').innerText = randomMsg;
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
